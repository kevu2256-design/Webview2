<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ZdkteScript SuperLight V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #121212;
            --bg-medium: #1e1e1e;
            --bg-light: #2d2d2d;
            --accent: #3a3a3a;
            --text-main: #e0e0e0;
            --text-dim: #888888;
            --active-tab: #252526;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .container { display: flex; flex-direction: column; height: 100vh; }

        /* Tab-Leiste oben */
        .tab-bar {
            display: flex;
            background-color: var(--bg-dark);
            padding-top: 5px;
            padding-left: 10px;
            gap: 2px;
            border-bottom: 1px solid #252525;
        }

        .tab {
            background-color: var(--bg-medium);
            color: var(--text-dim);
            padding: 8px 15px;
            font-size: 12px;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
            min-width: 80px;
            text-align: center;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .tab.active {
            background-color: var(--active-tab);
            color: white;
            border: 1px solid #333;
            border-bottom: none;
        }

        .tab:hover:not(.active) { background-color: #2a2a2a; }

        /* Hauptbereich */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; background: var(--active-tab); }

        #editor-container { flex-grow: 1; width: 100%; }

        /* Fußzeile mit Controls */
        .controls {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background-color: var(--bg-dark);
            gap: 10px;
            border-top: 1px solid #252525;
        }

        button {
            background-color: var(--bg-light);
            color: white;
            border: 1px solid #444;
            padding: 6px 15px;
            font-size: 13px;
            border-radius: 3px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: #3d3d3d; border-color: #555; }
        
        button.execute { background-color: #2d2d2d; font-weight: bold; border-color: #444; }
        button.execute:hover { background-color: #383838; }

        .info {
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-bar" id="tabBar">
        <div class="tab active" onclick="switchTab(1)">Script 1</div>
        <div class="tab" onclick="switchTab(2)">Script 2</div>
        <div class="tab" onclick="switchTab(3)">Script 3</div>
        <div class="tab" onclick="switchTab(4)">Script 4</div>
        <div class="tab" onclick="switchTab(5)">Script 5</div>
        <div class="tab" onclick="switchTab(6)">Script 6</div>
        <div class="tab" onclick="switchTab(7)">Script 7</div>
    </div>

    <div class="main-content">
        <div id="editor-container"></div>
    </div>

    <div class="controls">
        <button class="execute" onclick="execute()">Execute</button>
        <button onclick="clearEditor()">Clear</button>
        <button onclick="inject()">Inject</button> <div class="info">ZdkteScript SuperLight V2 | v0.23.5 | 2026</div>
    </div>
</div>

<script>
    let editor;
    let tabData = { 1: "", 2: "", 3: "", 4: "", 5: "", 6: "", 7: "" };
    let currentTab = 1;

    // Monaco Setup
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: "-- ZdkteScript SuperLight V2\nprint('Ready to execute!')",
            language: 'lua',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 14,
            fontFamily: 'JetBrains Mono',
            minimap: { enabled: false },
            lineNumbers: "on",
            renderLineHighlight: "all",
            scrollbar: { verticalScrollbarSize: 8, horizontalScrollbarSize: 8 }
        });
    });

    function switchTab(tabID) {
        // Speichere aktuellen Code
        tabData[currentTab] = editor.getValue();
        
        // UI Update
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab')[tabID-1].classList.add('active');
        
        // Lade neuen Code
        currentTab = tabID;
        editor.setValue(tabData[currentTab] || `-- Tab ${tabID}\n`);
    }

    function execute() {
        const code = editor.getValue();
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage("EXECUTE:" + code);
        }
    }

    function inject() {
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage("INJECT");
        }
    }

    function clearEditor() {
        editor.setValue("");
    }
</script>

</body>
</html>
