<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Ase 0.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <style>
        :root {
            --bg-main: #121212;
            --bg-tabs: #1a1a1a;
            --accent-gray: #333333;
            --text-color: #d1d1d1;
            --tab-active: #252525;
            --close-hover: #ff4d4d;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-main); color: var(--text-color); font-family: 'Inter', sans-serif; overflow: hidden; }
        .app { display: flex; flex-direction: column; height: 100vh; border: 1px solid #222; }

        /* Tab Leiste */
        .tab-bar {
            display: flex;
            background: #0d0d0d;
            padding: 5px 10px 0;
            gap: 3px;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .tab {
            background: var(--bg-tabs);
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
            min-width: 80px;
            transition: 0.2s;
        }

        .tab.active { background: var(--tab-active); border: 1px solid #333; border-bottom: none; color: white; }

        .close-btn {
            font-size: 10px;
            color: #666;
            padding: 2px 5px;
            border-radius: 3px;
            transition: 0.2s;
        }

        .close-btn:hover { background: var(--close-hover); color: white; }

        .add-tab-btn {
            padding: 0 10px;
            cursor: pointer;
            color: #888;
            font-size: 18px;
        }

        .add-tab-btn:hover { color: white; }

        /* Editor */
        #editor-container { flex-grow: 1; background: var(--tab-active); }

        /* Footer */
        .footer {
            display: flex;
            padding: 10px 15px;
            background: #0d0d0d;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #222;
        }

        button {
            background: #222;
            color: white;
            border: 1px solid #333;
            padding: 5px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        button:hover { background: #333; }
        button.primary { border-color: #444; font-weight: 600; }

        .status-info { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #555; }
    </style>
</head>
<body>

<div class="app">
    <div class="tab-bar">
        <div id="tab-list" style="display: flex; gap: 3px;"></div>
        <div class="add-tab-btn" onclick="addTab()">+</div>
    </div>

    <div id="editor-container"></div>

    <div class="footer">
        <button class="primary" onclick="sendExecute()">Execute</button>
        <button onclick="sendInject()">Inject</button>
        <button onclick="editor.setValue('')">Clear</button>
        <div class="status-info">ASE 0.5 | v0.23.5 | 2026</div>
    </div>
</div>

<script>
    let editor;
    let tabs = [{ id: Date.now(), name: "Script 1", content: "-- Ase 0.5" }];
    let activeTabId = tabs[0].id;

    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: tabs[0].content,
            language: 'lua',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 13,
            minimap: { enabled: false }
        });
        renderTabs();
    });

    function renderTabs() {
        const container = document.getElementById('tab-list');
        container.innerHTML = "";
        tabs.forEach((tab, index) => {
            const tabEl = document.createElement('div');
            tabEl.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
            tabEl.innerHTML = `
                <span onclick="switchTab(${tab.id})">${tab.name}</span>
                <span class="close-btn" onclick="closeTab(${tab.id}, event)">✕</span>
            `;
            container.appendChild(tabEl);
        });
    }

    function addTab() {
        if (tabs.length >= 5) return; // Maximal 5 Tabs
        const newId = Date.now();
        tabs.push({ id: newId, name: `Script ${tabs.length + 1}`, content: "-- New Script" });
        switchTab(newId);
    }

    function switchTab(id) {
        // Speichere aktuellen Inhalt
        const currentTab = tabs.find(t => t.id === activeTabId);
        if (currentTab) currentTab.content = editor.getValue();

        activeTabId = id;
        const nextTab = tabs.find(t => t.id === id);
        editor.setValue(nextTab.content);
        renderTabs();
    }

    function closeTab(id, event) {
        event.stopPropagation();
        if (tabs.length === 1) {
            // Wenn es der letzte Tab ist, nur zurücksetzen
            editor.setValue("-- Ase 0.5");
            tabs[0].content = "-- Ase 0.5";
            return;
        }

        tabs = tabs.filter(t => t.id !== id);
        if (activeTabId === id) {
            activeTabId = tabs[0].id;
            editor.setValue(tabs[0].content);
        }
        renderTabs();
    }

    function sendExecute() {
        window.chrome.webview.postMessage("EXECUTE:" + editor.getValue());
    }

    function sendInject() {
        window.chrome.webview.postMessage("INJECT");
    }
</script>
</body>
</html>
